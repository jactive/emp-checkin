name: EmPCheckIn
options:
  bundleIdPrefix: org.emeraldparents
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  EmPQian:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/Qian
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.emeraldparents.emp-qian
        PRODUCT_NAME: EmPQian
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Sources/Qian/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "EmP Qian"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6CANVVDJD7
    dependencies: []

  EmPDao:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/Dao
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.emeraldparents.emp-dao
        PRODUCT_NAME: EmPDao
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Sources/Dao/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "EmP Dao"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6CANVVDJD7
    dependencies: []

  EmPTong:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/Tong
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.emeraldparents.emp-tong
        PRODUCT_NAME: EmPTong
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "EmP Tong"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6CANVVDJD7
    dependencies: []
